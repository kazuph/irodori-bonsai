services:
  llm:
    build:
      context: ..
      dockerfile: docker/Dockerfile.llm
    command:
      - "--model"
      - "/models/Bonsai-8B.gguf"
      - "--n-gpu-layers"
      - "-1"
      - "--ctx-size"
      - "2048"
      - "--chat-template"
      - "chatml"
    volumes:
      - hf-cache:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cuda
    ports:
      - "7861:7860"
    environment:
      - LLM_API_BASE=http://llm:8080
    volumes:
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      llm:
        condition: service_healthy
    restart: unless-stopped

volumes:
  hf-cache:
